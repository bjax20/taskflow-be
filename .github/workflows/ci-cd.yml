name: Taskflow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  #  The "Quality Gate" (CI)
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests (TDD Strict)
        run: npm run test
        env:
          DATABASE_URL: mysql://root:password@localhost:3306/taskflow_test

  # The "Delivery" (Build & Push Docker)
  build-docker:
    needs: test-and-lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taskflow-backend:latest

  # The "Deployment" (CD) - WITH HEALTH CHECKS & ROLLBACK
# The "Deployment" (CD) - STAYS ALIVE ON FAILURE
  deploy:
    needs: build-docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/taskflow-backend/"

      - name: Deploy to Singapore VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            
            echo "=== Starting Deployment ==="
            mkdir -p ~/taskflow-backend
            cd ~/taskflow-backend
            
            echo "Creating .env file..."
            cat > ~/taskflow-backend/.env << EOF
            DATABASE_URL="mysql://dev_user:dev_password@db:3306/taskflow_db"
            HEALTH_TOKEN=${{ secrets.HEALTH_TOKEN }}
            NODE_ENV=production
            EOF
            
            echo "Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/taskflow-backend:latest
            
            echo "Restarting Containers..."
            docker-compose down || true
            docker-compose up -d
            
            # ===== HEALTH CHECK LOOP =====
            echo "=== Waiting for API to be ready ==="
            MAX_ATTEMPTS=20
            ATTEMPT=0
            
            until docker-compose exec -T api curl -s http://localhost:3000/health -H "Authorization: Bearer ${{ secrets.HEALTH_TOKEN }}" &> /dev/null; do
              ATTEMPT=$((ATTEMPT + 1))
              
              if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
                echo "❌ API failed to start after $MAX_ATTEMPTS attempts"
                
                echo "=== DEBUG: PRINTING API LOGS ==="
                docker-compose logs --tail=100 api
                
                echo "⚠️ KEEPING CONTAINERS ALIVE FOR DEBUGGING ⚠️"
                echo "SSH into your VPS now and run: docker logs taskflow_api"
                
                # We stop the script here so GitHub shows a failure, 
                # but we DO NOT run docker-compose down.
                exit 1
              fi
              
              echo "API not ready... Attempt $ATTEMPT/$MAX_ATTEMPTS"
              sleep 3
            done

            echo "✅ API is ready!"
            
            echo "Running Prisma migrations..."
            docker-compose exec -T api npx prisma migrate deploy
            
            echo "=== ✅ Deployment Successful ==="