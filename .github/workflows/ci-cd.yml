name: Taskflow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  #  The "Quality Gate" (CI)
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          # Use secrets for the DB setup
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          MYSQL_DATABASE: taskflow_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -ppassword" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Prisma Generate
        run: npx prisma generate

      - name: Run Tests (TDD Strict)
        run: npm run test
        env:
          NODE_ENV: test
          # Construct the URL using the secret
          DATABASE_URL: mysql://root:${{ secrets.DB_ROOT_PASSWORD }}@localhost:3306/taskflow_test
          API_PORT: ${{ secrets.API_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          # Add any other required envs from your config provider here
          API_PREFIX: ${{ secrets.API_PREFIX }}

  # The "Delivery" (Build & Push Docker)
  build-docker:
    needs: test-and-lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taskflow-backend:latest

  # The "Deployment" (CD) - WITH HEALTH CHECKS & ROLLBACK
  # The "Deployment" (CD) - STAYS ALIVE ON FAILURE
  deploy:
    needs: build-docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/taskflow-backend/"

      - name: Deploy to Singapore VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e 
            echo "=== 🚀 STEP 1: Setting up Environment ==="
            mkdir -p ~/taskflow-backend
            cd ~/taskflow-backend

            # Create .env using the PORT secret
            cat > .env << EOF
            NODE_ENV=production
            API_PORT=${{ secrets.API_PORT }}
            API_PREFIX=${{ secrets.API_PREFIX }}
            HEALTH_TOKEN=${{ secrets.HEALTH_TOKEN }}
            SWAGGER_ENABLE=${{ secrets.SWAGGER_ENABLE }}
            # Auth Configuration
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            MYSQL_DATABASE=taskflow_db
            MYSQL_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            MYSQL_USER=dev_user
            MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }}
            DATABASE_URL="mysql://dev_user:${{ secrets.DB_PASSWORD }}@db:3306/taskflow_db"
            EOF

            echo "✅ .env created. Verifying keys..."
            grep -E "API_PORT|API_PREFIX|JWT_SECRET|DATABASE_URL" .env | sed 's/=.*//' | sed 's/^/Injected: /'

            echo "=== 📦 STEP 2: Refreshing Containers ==="
            docker pull billjerson/taskflow-backend:latest
            docker-compose down || true
            docker-compose up -d --force-recreate

            echo "=== 🔍 STEP 3: MySQL Health Check ==="
            until docker-compose exec -T db mysqladmin ping -h localhost -u root -p${{ secrets.DB_ROOT_PASSWORD }} &> /dev/null; do
              echo "MySQL warming up..."
              sleep 3
            done
            echo "✅ MySQL is ready!"

            echo "=== 🧪 STEP 4: API Health Check ==="
            # We use the secret here for the curl command too
            MAX_API_ATTEMPTS=20
            API_ATTEMPT=0
            set +e
            until docker-compose exec -T api curl -s http://localhost:${{ secrets.API_PORT }}${{ secrets.API_PREFIX }}/health -H "Authorization: Bearer ${{ secrets.HEALTH_TOKEN }}" &> /dev/null; do
              API_ATTEMPT=$((API_ATTEMPT + 1))
              if [ $API_ATTEMPT -ge $MAX_API_ATTEMPTS ]; then
                echo "❌ API Health Check Failed on Port ${{ secrets.API_PORT }}"
                docker-compose logs --tail=100 api
                exit 1
              fi
              echo "API warming up on port ${{ secrets.API_PORT }}... ($API_ATTEMPT/$MAX_API_ATTEMPTS)"
              sleep 3
            done
            set -e
            echo "✅ API is healthy!"

            echo "=== 🔄 STEP 5: Database Migrations ==="
            docker-compose exec -T api npx prisma migrate deploy

            echo "=== 🎉 ✅ DEPLOYMENT SUCCESSFUL ==="
