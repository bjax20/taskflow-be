name: Taskflow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  #  The "Quality Gate" (CI)
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests (TDD Strict)
        run: npm run test
        env:
          DATABASE_URL: mysql://root:password@localhost:3306/taskflow_test

  # The "Delivery" (Build & Push Docker)
  build-docker:
    needs: test-and-lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taskflow-backend:latest

  # The "Deployment" (CD) - WITH HEALTH CHECKS & ROLLBACK
  # The "Deployment" (CD) - STAYS ALIVE ON FAILURE
  deploy:
    needs: build-docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/taskflow-backend/"

      - name: Deploy to Singapore VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Exit on error, but we'll handle the health check manually
            set -e 
            
            echo "=== 🚀 Starting Deployment ==="
            mkdir -p ~/taskflow-backend
            cd ~/taskflow-backend
            
            # 2. Inject ALL necessary variables
            echo "Creating .env file..."
            cat > .env << EOF
            DATABASE_URL="mysql://dev_user:dev_password@db:3306/taskflow_db"
            HEALTH_TOKEN=${{ secrets.HEALTH_TOKEN }}
            NODE_ENV=production
            API_PORT=3000
            EOF
            
            echo "Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/taskflow-backend:latest
            
            echo "Restarting Containers..."
            docker-compose down || true
            docker-compose up -d
            
            # 3. Pre-flight Check: Ensure curl exists in the container
            echo "Checking container health-check readiness..."
            if ! docker-compose exec -T api which curl &> /dev/null; then
               echo "❌ FATAL: 'curl' not found in container. Health check will always fail."
               echo "Debug: Printing API logs immediately..."
               docker-compose logs api
               exit 1
            fi

            # 4. Smart Health Check Loop
            echo "=== ⏳ Waiting for API to be ready ==="
            MAX_ATTEMPTS=20
            ATTEMPT=0
            
            # Use 'set +e' so the loop doesn't kill the script when curl fails
            set +e
            until docker-compose exec -T api curl -s http://localhost:3000/health -H "Authorization: Bearer ${{ secrets.HEALTH_TOKEN }}" &> /dev/null; do
              ATTEMPT=$((ATTEMPT + 1))
              
              if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
                echo "❌ API failed to start after $MAX_ATTEMPTS attempts"
                echo "=== 📄 CRITICAL: LAST 100 LINES OF API LOGS ==="
                docker-compose logs --tail=100 api
                echo "⚠️ CONTAINERS REMAIN ACTIVE FOR INVESTIGATION ⚠️"
                exit 1
              fi
              
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: API still warming up..."
              sleep 3
            done
            set -e # Re-enable exit on error

            echo "✅ API is ready and healthy!"
            
            # 5. Migration Check
            echo "Running Prisma migrations..."
            if ! docker-compose exec -T api npx prisma migrate deploy; then
               echo "❌ Prisma Migration Failed!"
               docker-compose logs --tail=50 api
               exit 1
            fi
            
            echo "=== 🎉 ✅ Deployment Successful ==="