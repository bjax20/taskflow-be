services:
  db:
    image: mysql:8.0
    container_name: taskflow_db
    restart: always
    environment:
      # These now pull from the .env file created by GitHub Actions
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    image: billjerson/taskflow-backend:latest
    container_name: taskflow_api
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - db
    env_file:
      - .env
    environment:
      # Use the variable from .env
      DATABASE_URL: ${DATABASE_URL}

volumes:
  mysql_data: