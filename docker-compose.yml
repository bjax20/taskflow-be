services:
  tapos_db:
    image: mysql:8.0
    container_name: tapos_db
    restart: always
    environment:    
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Updated to use the root password for a more reliable ping
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    image: billjerson/tapos-be:latest
    container_name: tapos_api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      tapos_db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Prisma/NestJS will use this to connect
      DATABASE_URL: ${DATABASE_URL}

volumes:
  mysql_data: