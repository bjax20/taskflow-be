services:
  db:
    image: mysql:8.0
    container_name: taskflow_db
    restart: always
    environment:
      MYSQL_DATABASE: taskflow_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    # Use the image built by GitHub Actions
    image: billjerson/taskflow-backend:latest
    container_name: taskflow_api
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - db
    environment:
      DATABASE_URL: "mysql://dev_user:dev_password@db:3306/taskflow_db"
    # REMOVED volumes for production; the code is already inside the image

volumes:
  mysql_data: